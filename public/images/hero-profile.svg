<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 240">
<defs>
  <radialGradient id="pBg" cx="50%" cy="42%" r="65%"><stop offset="0%" stop-color="#14082a" stop-opacity=".95"/><stop offset="100%" stop-color="#050510"/></radialGradient>
  <!-- Multi-sector personality brain - each quadrant a different trait color -->
  <radialGradient id="pBrain1" cx="40%" cy="40%" r="50%"><stop offset="0%" stop-color="#E8547A" stop-opacity=".9"/><stop offset="55%" stop-color="#aa2244" stop-opacity=".35"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <radialGradient id="pBrain2" cx="60%" cy="40%" r="50%"><stop offset="0%" stop-color="#00eeff" stop-opacity=".9"/><stop offset="55%" stop-color="#0077aa" stop-opacity=".35"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <radialGradient id="pBrain3" cx="40%" cy="60%" r="50%"><stop offset="0%" stop-color="#44ff88" stop-opacity=".85"/><stop offset="55%" stop-color="#006633" stop-opacity=".3"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <radialGradient id="pBrain4" cx="60%" cy="60%" r="50%"><stop offset="0%" stop-color="#ffcc44" stop-opacity=".85"/><stop offset="55%" stop-color="#aa7700" stop-opacity=".3"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <radialGradient id="pBrainCore" cx="50%" cy="48%" r="38%"><stop offset="0%" stop-color="#c4b5fd" stop-opacity=".7"/><stop offset="50%" stop-color="#7C5CFC" stop-opacity=".3"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <clipPath id="pHeadClip"><path d="M 168,215 L 168,180 C 161,160 158,138 157,114 C 156,90 159,68 169,51 C 179,36 195,26 213,23 C 231,20 250,27 260,43 C 269,58 268,76 265,88 C 262,99 256,104 258,113 C 260,122 261,127 258,134 C 252,142 245,148 239,158 C 232,168 228,180 225,193 C 223,203 222,210 222,215 Z"/></clipPath>
  <filter id="pGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="pBigBloom"><feGaussianBlur stdDeviation="18"/></filter>
  <filter id="pMedBloom"><feGaussianBlur stdDeviation="10"/></filter>
  <filter id="pSmBloom"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="pSg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="pFade" x1="0" y1=".76" x2="0" y2="1"><stop offset="0%" stop-color="#050510" stop-opacity="0"/><stop offset="100%" stop-color="#050510"/></linearGradient>
  <linearGradient id="pHeadFill" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0d0820"/><stop offset="100%" stop-color="#140d28"/></linearGradient>
</defs>

<rect width="430" height="240" fill="#050510"/>
<rect width="430" height="240" fill="url(#pBg)"/>

<!-- Multi-color bloom (personality trait auras) -->
<ellipse cx="200" cy="75" rx="70" ry="55" fill="#E8547A" filter="url(#pBigBloom)" opacity=".06"><animate attributeName="opacity" values=".04;.1;.04" dur="4s" repeatCount="indefinite"/></ellipse>
<ellipse cx="228" cy="75" rx="70" ry="55" fill="#00eeff" filter="url(#pBigBloom)" opacity=".06"><animate attributeName="opacity" values=".04;.1;.04" dur="4.5s" repeatCount="indefinite"/></ellipse>
<ellipse cx="200" cy="98" rx="65" ry="50" fill="#44ff88" filter="url(#pBigBloom)" opacity=".04"><animate attributeName="opacity" values=".03;.08;.03" dur="5s" repeatCount="indefinite"/></ellipse>
<ellipse cx="228" cy="98" rx="65" ry="50" fill="#ffcc44" filter="url(#pBigBloom)" opacity=".04"><animate attributeName="opacity" values=".03;.08;.03" dur="5.5s" repeatCount="indefinite"/></ellipse>
<ellipse cx="215" cy="85" rx="110" ry="78" fill="#7C5CFC" filter="url(#pBigBloom)" opacity=".05"><animate attributeName="opacity" values=".03;.08;.03" dur="3.5s" repeatCount="indefinite"/></ellipse>

<!-- Stars -->
<g opacity=".75">
  <circle cx="22" cy="20" r=".6" fill="#fff"><animate attributeName="opacity" values=".1;.82;.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="48" cy="10" r=".5" fill="#ffaacc"><animate attributeName="opacity" values=".1;.7;.1" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="15" cy="48" r=".7" fill="#fff"><animate attributeName="opacity" values=".08;.62;.08" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="62" cy="32" r=".4" fill="#E8547A"><animate attributeName="opacity" values=".1;.7;.1" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="390" cy="20" r=".6" fill="#fff"><animate attributeName="opacity" values=".1;.8;.1" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="415" cy="12" r=".5" fill="#c4b5fd"><animate attributeName="opacity" values=".08;.65;.08" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="45" r=".4" fill="#fff"><animate attributeName="opacity" values=".1;.6;.1" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="62" r=".5" fill="#7C5CFC"><animate attributeName="opacity" values=".06;.5;.06" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="35" cy="95" r=".5" fill="#00eeff"><animate attributeName="opacity" values=".06;.45;.06" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="145" r=".4" fill="#44ff88"><animate attributeName="opacity" values=".06;.4;.06" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="145" r=".4" fill="#ffcc44"><animate attributeName="opacity" values=".06;.4;.06" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="22" r=".4" fill="#00eeff"><animate attributeName="opacity" values=".08;.55;.08" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="330" cy="22" r=".4" fill="#E8547A"><animate attributeName="opacity" values=".08;.55;.08" dur="3.8s" repeatCount="indefinite"/></circle>
</g>

<!-- HEAD SILHOUETTE (centered) -->
<path d="M 168,215 L 168,180 C 161,160 158,138 157,114 C 156,90 159,68 169,51 C 179,36 195,26 213,23 C 231,20 250,27 260,43 C 269,58 268,76 265,88 C 262,99 256,104 258,113 C 260,122 261,127 258,134 C 252,142 245,148 239,158 C 232,168 228,180 225,193 C 223,203 222,210 222,215 Z" fill="url(#pHeadFill)"/>

<!-- Multi-color personality brain sectors -->
<!-- Top-left: Emotional (pink/rose) -->
<ellipse cx="198" cy="72" rx="38" ry="32" fill="url(#pBrain1)" clip-path="url(#pHeadClip)"><animate attributeName="opacity" values=".65;.92;.65" dur="3.2s" repeatCount="indefinite"/></ellipse>
<!-- Top-right: Intelligence/Analysis (cyan) -->
<ellipse cx="230" cy="72" rx="38" ry="32" fill="url(#pBrain2)" clip-path="url(#pHeadClip)"><animate attributeName="opacity" values=".65;.92;.65" dur="3.8s" repeatCount="indefinite"/></ellipse>
<!-- Bottom-left: Playfulness (green) -->
<ellipse cx="198" cy="100" rx="36" ry="28" fill="url(#pBrain3)" clip-path="url(#pHeadClip)" opacity=".8"><animate attributeName="opacity" values=".55;.85;.55" dur="4s" repeatCount="indefinite"/></ellipse>
<!-- Bottom-right: Warmth (gold) -->
<ellipse cx="230" cy="100" rx="36" ry="28" fill="url(#pBrain4)" clip-path="url(#pHeadClip)" opacity=".8"><animate attributeName="opacity" values=".55;.85;.55" dur="4.5s" repeatCount="indefinite"/></ellipse>
<!-- Core central glow (wisdom/soul) -->
<ellipse cx="213" cy="84" rx="28" ry="24" fill="url(#pBrainCore)" clip-path="url(#pHeadClip)"><animate attributeName="opacity" values=".7;1;.7" dur="2.5s" repeatCount="indefinite"/><animate attributeName="rx" values="26;30;26" dur="3s" repeatCount="indefinite"/></ellipse>
<!-- Core inner bloom -->
<ellipse cx="213" cy="84" rx="16" ry="14" fill="#7C5CFC" filter="url(#pMedBloom)" opacity=".45" clip-path="url(#pHeadClip)"><animate attributeName="opacity" values=".28;.58;.28" dur="2s" repeatCount="indefinite"/></ellipse>

<!-- Brain wires (multi-color neural network) -->
<g clip-path="url(#pHeadClip)" filter="url(#pSg)">
  <!-- Pink sector wires -->
  <path d="M 198,34 Q 182,32 170,42 Q 160,52 158,66 Q 157,78 162,89" fill="none" stroke="#ff6688" stroke-width="1.2" opacity=".52"><animate attributeName="opacity" values=".32;.68;.32" dur="2.6s" repeatCount="indefinite"/></path>
  <!-- Cyan sector wires -->
  <path d="M 228,34 Q 244,32 256,42 Q 266,52 268,66 Q 269,78 264,89" fill="none" stroke="#00eeff" stroke-width="1.2" opacity=".52"><animate attributeName="opacity" values=".32;.68;.32" dur="2.9s" repeatCount="indefinite"/></path>
  <!-- Green sector wires -->
  <path d="M 160,88 Q 159,100 162,112 Q 165,122 170,130" stroke="#44ff88" stroke-width=".9" fill="none" opacity=".45"><animate attributeName="opacity" values=".28;.62;.28" dur="3.2s" repeatCount="indefinite"/></path>
  <!-- Gold sector wires -->
  <path d="M 266,88 Q 267,100 264,112 Q 261,122 256,130" stroke="#ffcc44" stroke-width=".9" fill="none" opacity=".45"><animate attributeName="opacity" values=".28;.62;.28" dur="3.5s" repeatCount="indefinite"/></path>
  <!-- Cross connections (horizontal - personality layers) -->
  <line x1="162" y1="65" x2="266" y2="65" stroke="#7C5CFC" stroke-width=".5" opacity=".3" stroke-dasharray="3 4"><animate attributeName="stroke-dashoffset" values="0;14" dur="2s" repeatCount="indefinite"/></line>
  <line x1="160" y1="80" x2="268" y2="80" stroke="#c4b5fd" stroke-width=".45" opacity=".25" stroke-dasharray="2 5"><animate attributeName="stroke-dashoffset" values="0;14" dur="2.5s" repeatCount="indefinite"/></line>
  <line x1="162" y1="96" x2="265" y2="96" stroke="#7C5CFC" stroke-width=".4" opacity=".22" stroke-dasharray="2 4"><animate attributeName="stroke-dashoffset" values="0;12" dur="3s" repeatCount="indefinite"/></line>
  <!-- Vertical division (left/right hemispheres) -->
  <line x1="213" y1="34" x2="213" y2="128" stroke="#fff" stroke-width=".3" opacity=".12" stroke-dasharray="3 6"/>
  <!-- Horizontal division (top/bottom) -->
  <line x1="162" y1="84" x2="264" y2="84" stroke="#fff" stroke-width=".3" opacity=".12" stroke-dasharray="3 6"/>
  <!-- Sector curves -->
  <path d="M 188,40 Q 194,55 190,70" stroke="#ff88aa" stroke-width=".6" fill="none" opacity=".3"/>
  <path d="M 238,40 Q 232,55 236,70" stroke="#00ddee" stroke-width=".6" fill="none" opacity=".3"/>
  <path d="M 185,95 Q 196,102 210,104 Q 222,104 234,102 Q 246,99 252,95" stroke="#c4b5fd" stroke-width=".5" fill="none" opacity=".28" stroke-dasharray="2 3"><animate attributeName="stroke-dashoffset" values="0;10" dur="3s" repeatCount="indefinite"/></path>
</g>

<!-- Synapse nodes (one per trait sector) -->
<g clip-path="url(#pHeadClip)" filter="url(#pGlow)">
  <!-- Emotional (pink) node -->
  <circle cx="183" cy="60" r="2.4" fill="#ff6688"><animate attributeName="opacity" values=".3;1;.3" dur="1.3s" repeatCount="indefinite"/><animate attributeName="r" values="1.4;2.9;1.4" dur="1.3s" repeatCount="indefinite"/></circle>
  <!-- Intelligence (cyan) node -->
  <circle cx="243" cy="60" r="2.4" fill="#00eeff"><animate attributeName="opacity" values=".3;1;.3" dur="1.7s" repeatCount="indefinite"/><animate attributeName="r" values="1.4;2.9;1.4" dur="1.7s" repeatCount="indefinite"/></circle>
  <!-- Playfulness (green) node -->
  <circle cx="178" cy="102" r="2.1" fill="#44ff88"><animate attributeName="opacity" values=".28;.95;.28" dur="2.1s" repeatCount="indefinite"/><animate attributeName="r" values="1.2;2.6;1.2" dur="2.1s" repeatCount="indefinite"/></circle>
  <!-- Warmth (gold) node -->
  <circle cx="248" cy="102" r="2.1" fill="#ffcc44"><animate attributeName="opacity" values=".28;.95;.28" dur="1.9s" repeatCount="indefinite"/><animate attributeName="r" values="1.2;2.6;1.2" dur="1.9s" repeatCount="indefinite"/></circle>
  <!-- Core (purple) node -->
  <circle cx="213" cy="36" r="2.5" fill="#c4b5fd"><animate attributeName="opacity" values=".3;.95;.3" dur="1.1s" repeatCount="indefinite"/><animate attributeName="r" values="1.5;3;1.5" dur="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="213" cy="118" r="1.7" fill="#7C5CFC"><animate attributeName="opacity" values=".22;.82;.22" dur="2.3s" repeatCount="indefinite"/></circle>
</g>

<!-- Head outline (multi-color gradient glow) -->
<path d="M 168,215 L 168,180 C 161,160 158,138 157,114 C 156,90 159,68 169,51 C 179,36 195,26 213,23 C 231,20 250,27 260,43 C 269,58 268,76 265,88 C 262,99 256,104 258,113 C 260,122 261,127 258,134 C 252,142 245,148 239,158 C 232,168 228,180 225,193 C 223,203 222,210 222,215 Z" fill="none" stroke="#7C5CFC" stroke-width="1.4" opacity=".4" filter="url(#pGlow)"><animate attributeName="opacity" values=".24;.55;.24" dur="3s" repeatCount="indefinite"/></path>
<!-- Face edge glow (right side - soft multi-color) -->
<path d="M 260,43 C 269,58 268,76 265,88 C 262,99 256,104 258,113 C 260,122 261,127 258,134 C 252,142 245,148 239,158" fill="none" stroke="#c4b5fd" stroke-width="2" opacity=".55" filter="url(#pGlow)"><animate attributeName="opacity" values=".35;.7;.35" dur="2.8s" repeatCount="indefinite"/></path>

<!-- TRAIT READOUTS (right side - trait bars radiating from head) -->
<g opacity=".85">
  <!-- Emotional trait -->
  <circle cx="282" cy="58" r="3" fill="#ff6688" filter="url(#pSmBloom)" opacity=".8"><animate attributeName="opacity" values=".5;1;.5" dur="1.8s" repeatCount="indefinite"/></circle>
  <rect x="290" y="55" width="48" height="5" rx="2.5" fill="rgba(255,100,136,0.18)"/>
  <rect x="290" y="55" height="5" rx="2.5" fill="#ff6688"><animate attributeName="width" values="0;42;42" dur="2s" repeatCount="indefinite" begin=".3s"/></rect>
  <text x="290" y="49" font-size="8" fill="#ff8899" font-family="sans-serif" opacity=".8">Emotional</text>

  <!-- Intelligence trait -->
  <circle cx="282" cy="78" r="3" fill="#00eeff" filter="url(#pSmBloom)" opacity=".8"><animate attributeName="opacity" values=".5;1;.5" dur="2.1s" repeatCount="indefinite"/></circle>
  <rect x="290" y="75" width="48" height="5" rx="2.5" fill="rgba(0,220,255,0.18)"/>
  <rect x="290" y="75" height="5" rx="2.5" fill="#00eeff"><animate attributeName="width" values="0;38;38" dur="2.3s" repeatCount="indefinite" begin=".5s"/></rect>
  <text x="290" y="69" font-size="8" fill="#00eeff" font-family="sans-serif" opacity=".8">Analytical</text>

  <!-- Playfulness trait -->
  <circle cx="282" cy="98" r="3" fill="#44ff88" filter="url(#pSmBloom)" opacity=".8"><animate attributeName="opacity" values=".5;1;.5" dur="2.4s" repeatCount="indefinite"/></circle>
  <rect x="290" y="95" width="48" height="5" rx="2.5" fill="rgba(68,255,136,0.18)"/>
  <rect x="290" y="95" height="5" rx="2.5" fill="#44ff88"><animate attributeName="width" values="0;32;32" dur="2.6s" repeatCount="indefinite" begin=".7s"/></rect>
  <text x="290" y="89" font-size="8" fill="#66ffaa" font-family="sans-serif" opacity=".8">Playful</text>

  <!-- Warmth trait -->
  <circle cx="282" cy="118" r="3" fill="#ffcc44" filter="url(#pSmBloom)" opacity=".8"><animate attributeName="opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></circle>
  <rect x="290" y="115" width="48" height="5" rx="2.5" fill="rgba(255,200,68,0.18)"/>
  <rect x="290" y="115" height="5" rx="2.5" fill="#ffcc44"><animate attributeName="width" values="0;44;44" dur="2.8s" repeatCount="indefinite" begin=".9s"/></rect>
  <text x="290" y="109" font-size="8" fill="#ffdd66" font-family="sans-serif" opacity=".8">Warmth</text>

  <!-- Connection lines from head to bars -->
  <path d="M 261,60 Q 270,60 279,58" fill="none" stroke="#ff6688" stroke-width=".5" opacity=".4" stroke-dasharray="2 3"><animate attributeName="opacity" values=".25;.55;.25" dur="2s" repeatCount="indefinite"/></path>
  <path d="M 261,80 Q 270,79 279,78" fill="none" stroke="#00eeff" stroke-width=".5" opacity=".4" stroke-dasharray="2 3"><animate attributeName="opacity" values=".25;.55;.25" dur="2.3s" repeatCount="indefinite"/></path>
  <path d="M 259,97 Q 270,97 279,98" fill="none" stroke="#44ff88" stroke-width=".5" opacity=".4" stroke-dasharray="2 3"><animate attributeName="opacity" values=".25;.55;.25" dur="2.6s" repeatCount="indefinite"/></path>
  <path d="M 259,116 Q 270,117 279,118" fill="none" stroke="#ffcc44" stroke-width=".5" opacity=".4" stroke-dasharray="2 3"><animate attributeName="opacity" values=".25;.55;.25" dur="2.8s" repeatCount="indefinite"/></path>
</g>

<!-- LEFT SIDE TRAIT INDICATORS (mirror) -->
<g opacity=".55">
  <circle cx="148" cy="66" r="2" fill="#ff6688" filter="url(#pSmBloom)"><animate attributeName="opacity" values=".3;.8;.3" dur="2.5s" repeatCount="indefinite"/></circle>
  <rect x="100" y="63" width="44" height="4" rx="2" fill="#ff6688"><animate attributeName="width" values="0;38;38" dur="2s" repeatCount="indefinite" begin=".4s"/></rect>
  <circle cx="148" cy="84" r="2" fill="#00eeff" filter="url(#pSmBloom)"><animate attributeName="opacity" values=".3;.8;.3" dur="2.8s" repeatCount="indefinite"/></circle>
  <rect x="110" y="81" width="34" height="4" rx="2" fill="#00eeff"><animate attributeName="width" values="0;30;30" dur="2.3s" repeatCount="indefinite" begin=".6s"/></rect>
  <circle cx="148" cy="102" r="2" fill="#44ff88" filter="url(#pSmBloom)"><animate attributeName="opacity" values=".3;.8;.3" dur="3s" repeatCount="indefinite"/></circle>
  <rect x="115" y="99" width="29" height="4" rx="2" fill="#44ff88"><animate attributeName="width" values="0;25;25" dur="2.6s" repeatCount="indefinite" begin=".8s"/></rect>
</g>

<!-- Floating particles -->
<g filter="url(#pGlow)">
  <circle cx="215" cy="14" r="1.3" fill="#c4b5fd"><animate attributeName="opacity" values=".2;.8;.2" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="150" r="1" fill="#E8547A"><animate attributeName="opacity" values=".2;.7;.2" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="258" cy="150" r="1" fill="#00eeff"><animate attributeName="opacity" values=".2;.7;.2" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="215" cy="165" r=".9" fill="#7C5CFC"><animate attributeName="opacity" values=".15;.6;.15" dur="3s" repeatCount="indefinite"/></circle>
  <!-- Orbiting personality sparks around head -->
  <circle r="1.5" fill="#E8547A" filter="url(#pGlow)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M 213,22 Q 270,84 213,148 Q 156,84 213,22"/>
    <animate attributeName="opacity" values=".3;.8;.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.2" fill="#00eeff" filter="url(#pGlow)">
    <animateMotion dur="10s" repeatCount="indefinite" begin="2s" path="M 213,22 Q 270,84 213,148 Q 156,84 213,22"/>
    <animate attributeName="opacity" values=".25;.7;.25" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="1" fill="#44ff88" filter="url(#pGlow)">
    <animateMotion dur="12s" repeatCount="indefinite" begin="5s" path="M 213,22 Q 270,84 213,148 Q 156,84 213,22"/>
    <animate attributeName="opacity" values=".2;.65;.2" dur="6s" repeatCount="indefinite"/>
  </circle>
</g>

<rect x="0" y="178" width="430" height="62" fill="url(#pFade)"/>
</svg>
