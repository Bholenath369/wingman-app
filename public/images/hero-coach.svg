<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 240">
<defs>
  <radialGradient id="cBg" cx="38%" cy="45%" r="65%"><stop offset="0%" stop-color="#1a0828" stop-opacity=".95"/><stop offset="100%" stop-color="#050510"/></radialGradient>
  <radialGradient id="cBrain" cx="55%" cy="45%" r="45%"><stop offset="0%" stop-color="#ff6699" stop-opacity=".95"/><stop offset="35%" stop-color="#cc2266" stop-opacity=".55"/><stop offset="72%" stop-color="#880033" stop-opacity=".18"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <radialGradient id="cBubble" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#E8547A" stop-opacity=".5"/><stop offset="60%" stop-color="#7C5CFC" stop-opacity=".2"/><stop offset="100%" stop-opacity="0"/></radialGradient>
  <clipPath id="cHeadClip"><path d="M 108,215 L 108,178 C 101,157 98,136 97,112 C 96,88 99,66 108,50 C 118,35 133,26 150,23 C 167,20 185,27 194,42 C 202,57 200,75 198,86 C 195,97 189,102 190,111 C 192,120 193,125 190,131 C 184,139 178,144 172,154 C 165,164 161,175 158,188 C 156,198 156,208 156,215 Z"/></clipPath>
  <filter id="cGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cBigBloom"><feGaussianBlur stdDeviation="18"/></filter>
  <filter id="cMedBloom"><feGaussianBlur stdDeviation="10"/></filter>
  <filter id="cSmBloom"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="cSg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="cFade" x1="0" y1=".76" x2="0" y2="1"><stop offset="0%" stop-color="#050510" stop-opacity="0"/><stop offset="100%" stop-color="#050510"/></linearGradient>
  <linearGradient id="cHeadFill" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#100818"/><stop offset="100%" stop-color="#180c22"/></linearGradient>
  <linearGradient id="cBubbleStroke" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E8547A"/><stop offset="100%" stop-color="#7C5CFC"/></linearGradient>
</defs>

<rect width="430" height="240" fill="#050510"/>
<rect width="430" height="240" fill="url(#cBg)"/>

<!-- Ambient bloom -->
<ellipse cx="148" cy="88" rx="90" ry="68" fill="#E8547A" filter="url(#cBigBloom)" opacity=".1"><animate attributeName="opacity" values=".07;.15;.07" dur="4s" repeatCount="indefinite"/></ellipse>
<ellipse cx="310" cy="110" rx="100" ry="70" fill="#7C5CFC" filter="url(#cBigBloom)" opacity=".07"><animate attributeName="opacity" values=".04;.1;.04" dur="5s" repeatCount="indefinite"/></ellipse>
<ellipse cx="215" cy="95" rx="150" ry="85" fill="#E8547A" filter="url(#cBigBloom)" opacity=".04"><animate attributeName="opacity" values=".03;.07;.03" dur="6s" repeatCount="indefinite"/></ellipse>

<!-- Stars -->
<g opacity=".75">
  <circle cx="22" cy="18" r=".6" fill="#fff"><animate attributeName="opacity" values=".1;.8;.1" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="48" cy="10" r=".5" fill="#ffaabb"><animate attributeName="opacity" values=".1;.7;.1" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="15" cy="48" r=".7" fill="#fff"><animate attributeName="opacity" values=".08;.62;.08" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="65" cy="32" r=".4" fill="#E8547A"><animate attributeName="opacity" values=".1;.7;.1" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="20" r=".6" fill="#fff"><animate attributeName="opacity" values=".1;.8;.1" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="410" cy="12" r=".5" fill="#c4b5fd"><animate attributeName="opacity" values=".08;.65;.08" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="45" r=".4" fill="#fff"><animate attributeName="opacity" values=".1;.6;.1" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="395" cy="60" r=".5" fill="#a78bfa"><animate attributeName="opacity" values=".06;.5;.06" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="35" cy="95" r=".5" fill="#E8547A"><animate attributeName="opacity" values=".06;.45;.06" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="415" cy="92" r=".5" fill="#7C5CFC"><animate attributeName="opacity" values=".06;.45;.06" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="195" cy="12" r=".4" fill="#ffaacc"><animate attributeName="opacity" values=".08;.55;.08" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="235" cy="18" r=".4" fill="#c4b5fd"><animate attributeName="opacity" values=".08;.55;.08" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="55" cy="140" r=".4" fill="#E8547A"><animate attributeName="opacity" values=".06;.4;.06" dur="5.5s" repeatCount="indefinite"/></circle>
</g>

<!-- HEAD SILHOUETTE (left-center, facing right) -->
<path d="M 108,215 L 108,178 C 101,157 98,136 97,112 C 96,88 99,66 108,50 C 118,35 133,26 150,23 C 167,20 185,27 194,42 C 202,57 200,75 198,86 C 195,97 189,102 190,111 C 192,120 193,125 190,131 C 184,139 178,144 172,154 C 165,164 161,175 158,188 C 156,198 156,208 156,215 Z" fill="url(#cHeadFill)"/>

<!-- Pink/rose brain glow inside head -->
<ellipse cx="143" cy="78" rx="52" ry="46" fill="url(#cBrain)" clip-path="url(#cHeadClip)"><animate attributeName="opacity" values=".78;1;.78" dur="3s" repeatCount="indefinite"/><animate attributeName="rx" values="50;54;50" dur="3.8s" repeatCount="indefinite"/></ellipse>
<ellipse cx="143" cy="78" rx="36" ry="32" fill="#E8547A" filter="url(#cMedBloom)" opacity=".42" clip-path="url(#cHeadClip)"><animate attributeName="opacity" values=".26;.52;.26" dur="2.4s" repeatCount="indefinite"/></ellipse>

<!-- Brain wires (pink tones) -->
<g clip-path="url(#cHeadClip)" filter="url(#cSg)">
  <path d="M 143,35 Q 126,33 113,43 Q 102,53 100,67 Q 98,81 103,93 Q 109,106 120,113 Q 132,119 143,120" fill="none" stroke="#ff88aa" stroke-width="1.3" opacity=".58"><animate attributeName="opacity" values=".36;.75;.36" dur="2.5s" repeatCount="indefinite"/></path>
  <path d="M 143,35 Q 161,33 174,43 Q 185,53 187,67 Q 189,81 184,93 Q 178,106 167,113 Q 155,119 143,120" fill="none" stroke="#ffaabb" stroke-width="1" opacity=".45"><animate attributeName="opacity" values=".28;.62;.28" dur="3.2s" repeatCount="indefinite"/></path>
  <path d="M 116,50 Q 107,64 105,79 Q 104,93 109,105" stroke="#ff6688" stroke-width=".88" fill="none" opacity=".45"><animate attributeName="opacity" values=".28;.62;.28" dur="2.8s" repeatCount="indefinite"/></path>
  <path d="M 171,50 Q 180,64 182,79 Q 183,93 178,105" stroke="#ffaacc" stroke-width=".88" fill="none" opacity=".45"><animate attributeName="opacity" values=".28;.62;.28" dur="3.4s" repeatCount="indefinite"/></path>
  <line x1="104" y1="68" x2="184" y2="68" stroke="#ee4477" stroke-width=".55" opacity=".34" stroke-dasharray="3 4"><animate attributeName="stroke-dashoffset" values="0;14" dur="2s" repeatCount="indefinite"/></line>
  <line x1="102" y1="83" x2="186" y2="83" stroke="#ff6699" stroke-width=".45" opacity=".28" stroke-dasharray="2 5"><animate attributeName="stroke-dashoffset" values="0;14" dur="2.5s" repeatCount="indefinite"/></line>
  <path d="M 128,40 Q 133,55 130,68" stroke="#ff88bb" stroke-width=".6" fill="none" opacity=".34"/>
  <path d="M 158,40 Q 162,55 159,68" stroke="#ffaabb" stroke-width=".6" fill="none" opacity=".3"/>
  <path d="M 116,97 Q 129,103 143,103 Q 157,103 170,97" stroke="#ff7799" stroke-width=".5" fill="none" opacity=".3" stroke-dasharray="2 3"><animate attributeName="stroke-dashoffset" values="0;10" dur="3s" repeatCount="indefinite"/></path>
</g>

<!-- Synapse nodes (pink) -->
<g clip-path="url(#cHeadClip)" filter="url(#cGlow)">
  <circle cx="114" cy="63" r="2.3" fill="#ff88cc"><animate attributeName="opacity" values=".3;1;.3" dur="1.3s" repeatCount="indefinite"/><animate attributeName="r" values="1.4;2.8;1.4" dur="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="172" cy="60" r="2" fill="#ffaabb"><animate attributeName="opacity" values=".25;.92;.25" dur="1.8s" repeatCount="indefinite"/><animate attributeName="r" values="1.1;2.4;1.1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="143" cy="37" r="2.3" fill="#ff77aa"><animate attributeName="opacity" values=".3;.94;.3" dur="1.1s" repeatCount="indefinite"/><animate attributeName="r" values="1.4;2.8;1.4" dur="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="102" cy="87" r="1.7" fill="#E8547A"><animate attributeName="opacity" values=".2;.85;.2" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="184" cy="85" r="1.7" fill="#ff88bb"><animate attributeName="opacity" values=".2;.85;.2" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="139" cy="114" r="1.4" fill="#ffaacc"><animate attributeName="opacity" values=".2;.72;.2" dur="2.4s" repeatCount="indefinite"/></circle>
</g>

<!-- Head outline (pink glow) -->
<path d="M 108,215 L 108,178 C 101,157 98,136 97,112 C 96,88 99,66 108,50 C 118,35 133,26 150,23 C 167,20 185,27 194,42 C 202,57 200,75 198,86 C 195,97 189,102 190,111 C 192,120 193,125 190,131 C 184,139 178,144 172,154 C 165,164 161,175 158,188 C 156,198 156,208 156,215 Z" fill="none" stroke="#E8547A" stroke-width="1.4" opacity=".42" filter="url(#cGlow)"><animate attributeName="opacity" values=".24;.55;.24" dur="3s" repeatCount="indefinite"/></path>
<!-- Face edge bright glow -->
<path d="M 194,42 C 202,57 200,75 198,86 C 195,97 189,102 190,111 C 192,120 193,125 190,131 C 184,139 178,144 172,154" fill="none" stroke="#ff99bb" stroke-width="2" opacity=".55" filter="url(#cGlow)"><animate attributeName="opacity" values=".35;.7;.35" dur="2.6s" repeatCount="indefinite"/></path>

<!-- FLOWING THOUGHT PARTICLES from head toward messages -->
<g filter="url(#cGlow)">
  <circle r="1.8" fill="#E8547A" opacity="0">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s" path="M 192,80 Q 230,70 265,75"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.4" fill="#7C5CFC" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin=".8s" path="M 193,100 Q 238,90 275,105"/>
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.5s" repeatCount="indefinite" begin=".8s"/>
  </circle>
  <circle r="1.2" fill="#ffaacc" opacity="0">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.5s" path="M 191,120 Q 240,110 275,130"/>
    <animate attributeName="opacity" values="0;.6;.6;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</g>

<!-- MESSAGE BUBBLES (right side — before and after) -->
<!-- "Before" bubble (dimmer, unpolished) -->
<g opacity=".7">
  <rect x="220" y="48" width="95" height="50" rx="14" fill="#1a1028" stroke="rgba(124,92,252,0.4)" stroke-width=".8"/>
  <line x1="234" y1="63" x2="300" y2="63" stroke="#6E5F88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="234" y1="74" x2="290" y2="74" stroke="#6E5F88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="234" y1="85" x2="280" y2="85" stroke="#6E5F88" stroke-width="1.2" stroke-linecap="round"/>
  <!-- tail -->
  <polygon points="220,70 208,78 220,82" fill="#1a1028"/>
  <text x="300" y="96" font-size="9" fill="#6E5F88" font-family="sans-serif" opacity=".6">✦ raw</text>
</g>

<!-- Transformation arc -->
<path d="M 316,80 Q 330,100 316,122" fill="none" stroke="#E8547A" stroke-width="1.2" opacity=".5" stroke-dasharray="3 3"><animate attributeName="opacity" values=".3;.7;.3" dur="1.5s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;12" dur="1.5s" repeatCount="indefinite"/></path>
<circle cx="330" cy="100" r="5" fill="#E8547A" filter="url(#cSmBloom)" opacity=".6"><animate attributeName="opacity" values=".35;.8;.35" dur="1.5s" repeatCount="indefinite"/><animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/></circle>
<!-- Spark burst at transform point -->
<line x1="325" y1="95" x2="335" y2="88" stroke="#ff88bb" stroke-width="1" opacity="0"><animate attributeName="opacity" values="0;.8;0" dur="1.5s" repeatCount="indefinite"/></line>
<line x1="323" y1="100" x2="337" y2="100" stroke="#E8547A" stroke-width="1" opacity="0"><animate attributeName="opacity" values="0;.8;0" dur="1.5s" repeatCount="indefinite" begin=".1s"/></line>
<line x1="325" y1="105" x2="335" y2="112" stroke="#ffaacc" stroke-width="1" opacity="0"><animate attributeName="opacity" values="0;.8;0" dur="1.5s" repeatCount="indefinite" begin=".2s"/></line>

<!-- "After" bubble (glowing, polished) -->
<g>
  <rect x="220" y="115" width="95" height="52" rx="14" fill="#1e0f28" stroke="#E8547A" stroke-width="1" filter="url(#cSmBloom)" opacity=".92"><animate attributeName="opacity" values=".72;.98;.72" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="220" y="115" width="95" height="52" rx="14" fill="none" stroke="#ff88aa" stroke-width=".5" opacity=".6"/>
  <line x1="234" y1="130" x2="302" y2="130" stroke="#E8547A" stroke-width="1.8" stroke-linecap="round" opacity=".8"><animate attributeName="opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></line>
  <line x1="234" y1="141" x2="295" y2="141" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" opacity=".7"><animate attributeName="opacity" values=".45;.92;.45" dur="2.4s" repeatCount="indefinite"/></line>
  <line x1="234" y1="152" x2="280" y2="152" stroke="#E8547A" stroke-width="1.5" stroke-linecap="round" opacity=".55"><animate attributeName="opacity" values=".4;.8;.4" dur="2.8s" repeatCount="indefinite"/></line>
  <!-- tail -->
  <polygon points="220,142 208,150 220,148" fill="#1e0f28"/>
  <text x="296" y="163" font-size="9" fill="#E8547A" font-family="sans-serif" opacity=".9">✦ AI</text>
  <!-- glow effect on bubble -->
  <ellipse cx="267" cy="141" rx="38" ry="22" fill="#E8547A" filter="url(#cMedBloom)" opacity=".08"><animate attributeName="opacity" values=".04;.12;.04" dur="2.5s" repeatCount="indefinite"/></ellipse>
</g>

<!-- Floating sparkles around the "after" bubble -->
<g filter="url(#cGlow)">
  <circle cx="225" cy="110" r="1.5" fill="#E8547A"><animate attributeName="opacity" values="0;.9;0" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="112;105;112" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="312" cy="108" r="1.3" fill="#c4b5fd"><animate attributeName="opacity" values="0;.85;0" dur="2.3s" repeatCount="indefinite" begin=".5s"/><animate attributeName="cy" values="110;103;110" dur="2.3s" repeatCount="indefinite" begin=".5s"/></circle>
  <circle cx="218" cy="172" r="1.2" fill="#ff88aa"><animate attributeName="opacity" values="0;.8;0" dur="2.6s" repeatCount="indefinite" begin="1s"/><animate attributeName="cy" values="174;167;174" dur="2.6s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="318" cy="170" r="1" fill="#E8547A"><animate attributeName="opacity" values="0;.75;0" dur="3s" repeatCount="indefinite" begin=".7s"/><animate attributeName="cy" values="172;165;172" dur="3s" repeatCount="indefinite" begin=".7s"/></circle>
  <!-- Static particles right area -->
  <circle cx="355" cy="55" r="1" fill="#c4b5fd"><animate attributeName="opacity" values=".1;.6;.1" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="375" cy="80" r=".8" fill="#E8547A"><animate attributeName="opacity" values=".1;.55;.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="110" r=".9" fill="#7C5CFC"><animate attributeName="opacity" values=".1;.5;.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="365" cy="135" r=".7" fill="#ffaacc"><animate attributeName="opacity" values=".08;.5;.08" dur="4.5s" repeatCount="indefinite"/></circle>
</g>

<rect x="0" y="178" width="430" height="62" fill="url(#cFade)"/>
</svg>
